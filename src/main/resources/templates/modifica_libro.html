<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modifica Libro</title>
    <style>
        table {
            margin: auto;
            border-collapse: collapse;
        }
        td {
            padding: 10px;
        }
        label {
            font-weight: bold;
        }
        input {
            width: 100%;
        }
    </style>
</head>
<body style="background-color: #f2e1c1;">
    <h1 style="text-align: center;">Modifica libro:</h1>
    <form th:action="@{/libri/modifica}" th:object="${libro}" method="post">
        <input type="hidden" name="id" th:value="${libro.id}">
        <table>
            <tr>
                <td><label for="titolo">Titolo:</label></td>
                <td><input type="text" id="titolo" name="titolo" th:value="${libro.titolo}" required></td>
            </tr>
            <tr>
                <td><label for="autore">Autore:</label></td>
                <td><input type="text" id="autore" name="autore" th:value="${libro.autore}" required></td>
            </tr>
            <tr>
                <td><label for="genere">Genere:</label></td>
                <td><input type="text" id="genere" name="genere" th:value="${libro.genere}" required></td>
            </tr>
            <tr>
                <td><label for="annoRilascio">Anno di Rilascio:</label></td>
                <td><input type="number" id="annoRilascio" name="annoRilascio" th:value="${libro.annoRilascio}" min="0" required></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <button type="submit" class="btn btn-primary">Salva</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='/libri';">Annulla</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
