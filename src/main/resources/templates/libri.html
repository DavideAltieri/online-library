<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Libri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<h1 style="text-align: center;">Lista dei Libri</h1>
<div class="container">
    <div class="mb-3">
        <strong>Ordina per:</strong>
        <a th:href="@{/libri(sortBy='titolo')}">Titolo</a> |
        <a th:href="@{/libri(sortBy='autore')}">Autore</a> |
        <a th:href="@{/libri(sortBy='annoRilascio')}">Anno di Rilascio</a> |
        <a th:href="@{/libri(sortBy='genere')}">Genere</a>
    </div>
    <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Titolo</th>
            <th>Autore</th>
            <th>Genere</th>
            <th>Anno di Rilascio</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="libro : ${libri}">
            <td th:text="${libro.titolo}"></td>
            <td th:text="${libro.autore}"></td>
            <td th:text="${libro.genere}"></td>
            <td th:text="${libro.annoRilascio}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
